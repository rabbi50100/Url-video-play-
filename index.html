<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Open Graph Meta Tags for Default Share Preview -->
    <meta property="og:title" content="Url Video Player - Watch Movies">
    <meta property="og:description" content="Watch, download and share your favorite movies seamlessly.">
    <meta property="og:image" content="https://via.placeholder.com/600x315?text=Url+Video+Player+Movies">
    <meta property="og:type" content="website">

    <title>Url Video Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">
    <header>
        <h2 id="appTitleText">Url Video Player</h2>
        <div class="header-right">
            <select id="languageSelect" class="header-lang-select" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="bn">Bengali</option>
                <option value="hi">Hindi</option>
            </select>
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
    </header>

    <div class="status-bar">
        <span class="status-dot"></span> <span id="statusText">Ready to Play</span> 
        <span class="hd-quality" id="qualityDisplay">Auto</span>
    </div>

    <div class="video-container" id="videoContainer">
        <span id="placeholderText">ADD OR SELECT VIDEO TO PLAY</span>
        <div class="video-loader" id="videoLoader"></div>
        <video id="videoElement" playsinline preload="auto" autoplay></video>
        
        <div class="player-controls" id="playerControls">
            <div class="controls-top">
                <i class="fa-solid fa-chromecast" id="castBtn" title="Cast"></i>
                <i class="fa-solid fa-code-merge" title="Merge"></i>
            </div>
            <div class="controls-center">
                <div class="circle-control rewind" id="rewindBtn"><i class="fa-solid fa-rotate-left"></i></div>
                <div class="circle-control center-play-pause" id="centerPlayPause"><i class="fa-solid fa-play"></i></div>
                <div class="circle-control forward" id="forwardBtn"><i class="fa-solid fa-rotate-right"></i></div>
            </div>
            <div class="settings-menu" id="settingsMenu">
                <div class="setting-item" id="qualityOption">Quality: Auto</div>
                <div class="setting-item" id="speedOption">Speed: 1x</div>
                <div class="setting-item" id="downloadOption">Download</div>
            </div>
            <div class="controls-bottom-bar">
                <div class="time-display">
                    <span id="currentTime">00:00</span>
                    <span id="duration">0:00:00</span>
                </div>
                <div class="seek-bar-container" id="seekBarContainer">
                    <div class="seek-bar-progress" id="seekBarProgress"></div>
                    <div class="seek-handle" id="seekHandle"></div>
                </div>
                <div class="bottom-icons">
                    <i class="fa-solid fa-backward-step" id="restartBtn" title="Restart"></i>
                    <i class="fa-solid fa-gear" id="settingsBtn" title="Settings"></i>
                    <i class="fa-regular fa-clone" id="pipBtn" title="Picture in Picture"></i>
                    <i class="fa-solid fa-expand" id="fullscreenBtn" title="Fullscreen"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="content-card">
        
        <div id="home-section" class="nav-section active">
            <button id="adBtn" class="btn-ad" onclick="watchAd()">
                <i class="fa-solid fa-rectangle-ad"></i> Watch Ad First
            </button>

            <div class="input-group">
                <i class="fa-solid fa-t"></i>
                <input type="text" id="videoTitle" placeholder="Video Title">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-link"></i>
                <input type="text" id="videoUrl" placeholder="Video URL or TG Code">
            </div>

            <button id="savePlayBtn" class="btn-play" onclick="saveAndPlay()">
                <i class="fa-solid fa-play"></i> SAVE AND PLAY
            </button>
        </div>

        <div id="movies-section" class="nav-section">
            <h3 id="titleMovies" style="margin-top:0;">All Movies</h3>
            <div id="moviesGrid" class="movies-grid">
                <div class="placeholder-box" style="grid-column: span 2;">
                    <i class="fa-solid fa-spinner fa-spin" style="font-size: 30px; margin-bottom:10px; color:var(--primary-red);"></i><br>
                    <span id="txtLoading">Loading Movies...</span>
                </div>
            </div>
        </div>

        <div id="history-section" class="nav-section">
            <h3 id="titleHistory" style="margin-top:0;">Your History</h3>
            <div class="history-list" id="historyList"></div>
        </div>

        <div id="favorites-section" class="nav-section">
        </div>

        <div id="me-section" class="nav-section">
            <div id="loginArea" style="text-align:center; padding-top:10px;">
                <h3 id="titleWelcome" style="margin-bottom: 5px;">Welcome!</h3>
                <p id="descSync" style="color:var(--text-gray); font-size:14px; margin-bottom:20px;">Please login to sync your data</p>
                
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="emailInput" placeholder="Email Address">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="passwordInput" placeholder="Password">
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button id="btnLogin" class="btn-play" style="margin-top: 0; background: #333;" onclick="loginWithEmail()">Login</button>
                    <button id="btnReg" class="btn-play" style="margin-top: 0;" onclick="registerWithEmail()">Register</button>
                </div>

                <div id="textOr" style="margin: 15px 0; color: #aaa; font-size: 14px; font-weight: bold;">OR</div>

                <button id="btnGoogle" class="btn-play btn-google" style="margin-top: 0;" onclick="signInWithGoogle()">
                    <i class="fa-brands fa-google"></i> Login with Google
                </button>
            </div>
            
            <div id="profileArea" class="profile-container" style="display:none;">
                <img id="profilePic" src="" alt="Profile Picture">
                <h3 id="profileName">User Name</h3>
                <p id="profileEmail">user@gmail.com</p>
                <button id="btnLogout" class="btn-play btn-logout" onclick="signOut()">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </div>
        
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchNav('home', this)">
            <i class="fa-solid fa-house"></i>
            <span id="navHomeText">Home</span>
        </div>
        <div class="nav-item" onclick="switchNav('movies', this)">
            <i class="fa-solid fa-film"></i>
            <span id="navMoviesText">Movies</span>
        </div>
        <div class="nav-item" onclick="switchNav('history', this)">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span id="navHistText">History</span>
        </div>
        <div class="nav-item" onclick="switchNav('favorites', this)">
            <i class="fa-solid fa-heart"></i>
            <span id="navFavText">Favorites</span>
        </div>
        <div class="nav-item" onclick="switchNav('me', this)">
            <i class="fa-solid fa-user"></i>
            <span id="navMeText">Me</span>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="script.js"></script>

</body>
                                                        </html>
